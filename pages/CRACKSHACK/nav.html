  <body>

	}




.inputField1 {

  <script>


   
    function onSubmit(){
    if (document.getElementById('password').value == 'SUICIDENOTE') {window.location.href = 'suicidenote.html' }

    else if(document.getElementById('password').value == '1') {window.location.href = 'layer1.html'}

     }
