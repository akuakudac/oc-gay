<style>
    body {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  background-image: radial-gradient(#0026ff, #041607);
  font-family: VT323;
  
}
.center {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  
}
.wave {
  width: 5px;
  height: 100px;
  background: linear-gradient(45deg, rgb(255, 255, 255), cyan);
  margin: 10px;
  animation: wave 1s linear infinite;
  border-radius: 20px;
}
.wave:nth-child(2) {
  animation-delay: 0.1s;
}
.wave:nth-child(3) {
  animation-delay: 0.2s;
}
.wave:nth-child(4) {
  animation-delay: 0.3s;
}
.wave:nth-child(5) {
  animation-delay: 0.4s;
}
.wave:nth-child(6) {
  animation-delay: 0.5s;
}
.wave:nth-child(7) {
  animation-delay: 0.6s;
}
.wave:nth-child(8) {
  animation-delay: 0.7s;
}
.wave:nth-child(9) {
  animation-delay: 0.8s;
}
.wave:nth-child(10) {
  animation-delay: 0.9s;
}

@keyframes wave {
  0% {
    transform: scale(0);
  }
  50% {
    transform: scale(1);
  }
  100% {
    transform: scale(0);
  }
}


.waviy {
  position: relative;
}
.waviy span {
  position: relative;
  display: inline-block;
  font-size: 40px;
  color: rgb(255, 255, 255);
  text-transform: uppercase;
  animation: flip 1s infinite;
  animation-delay: calc(.1s * var(--i))
}
@keyframes flip {
  0%,80% {
    transform: rotateY(360deg) 
  }
}

body{
    background-color: black;
  }
  #screen{
    position: relative;
    width: 100%;
    height: 100vh;
    background-image: radial-gradient(#0026ff, #041607);
    font-family: VT323;

  }
  #scan{
    opacity: 70%;
  }
  #scan, #bezel {
    position: absolute;
    width: 100%;
    height:100% ;
    top: 0;
    left: 0;
  }
  #content{
    padding: 50px;
  }
</style>
