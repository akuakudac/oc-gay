<Style>
    @import url("https://fonts.googleapis.com/css?family=Assistant:400,700|Playfair+Display:900");



:root {
  --clr-light: #ffffff;
  --clr-dark: #f3b3b7;
  --clr-primary: #ffffff;
  --clr-secondary: #ffbdbd;
  --clr-accent: #ae5d6d;

}

.darkmode {

  --clr-dark: #362032;
  --clr-primary: #020323;
  --clr-secondary: #000010;
  --clr-accent: #000000;

  --foreground: var(--clr-light);
  --background: var(--clr-dark);
}

body {
  background: var(--background);
  color: var(--foreground);
  font-family: var(--ff-body);
  font-size: 18px;
  line-height: 1.6;
}

h1 {

.btn {

  display: inline-block;

}

.btn + .btn {

}

.btn-secondary {
  background: var(--foreground);
  color: var(--background);
  
}

.btn-accent {
  background: var(--clr-accent);
  color: var(--foreground);

.btn::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border: var(--foreground) 2px solid;
  left: -4px;
  top: 4px;
  border-radius: inherit;

}

<script>
    let darkMode = localStorage.getItem("darkMode");

const darkModeToggle = document.querySelector("#dark-mode-toggle");

function myFunction() {
  var x = document.getElementById("TOGGLEWORDS");
  if (x.innerHTML ===  
               "BIG BOOBS SABUROU" ) 
        {
    x.innerHTML = 'YOUR STUPID GIRLFRIEND';
  } 
  
  else {
    x.innerHTML = 
               "BIG BOOBS SABUROU" ;
  }
}




const enableDarkMode = () => {
  // 1. Add the class to the body
  document.body.classList.add("darkmode");
  // 2. Update darkMode in localStorage
  localStorage.setItem("darkMode", "enabled");
};

const disableDarkMode = () => {
  // 1. Remove the class from the body
  document.body.classList.remove("darkmode");
  // 2. Update darkMode in localStorage
  localStorage.setItem("darkMode", null);
};

// If the user already visited and enabled darkMode
// start things off with it on
if (darkMode === "enabled") {
  enableDarkMode();
}

// When someone clicks the button
darkModeToggle.addEventListener("click", () => {
  // get their darkMode setting
  darkMode = localStorage.getItem("darkMode");

  // if it not current enabled, enable it
  if (darkMode !== "enabled") {
    enableDarkMode();
    // if it has been enabled, turn it off
  } else {
    disableDarkMode();
  }
});
